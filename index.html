<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Silkscreen:wght@400;700&family=Pixelify+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=DotGothic16&display=swap" rel="stylesheet">

<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', monospace;
    -webkit-font-smoothing: antialiased;
    background: #0d0d0d;
    color: #e8e8e6;
  }
  ::selection { background: #e0ff4a; color: #0d0d0d; }
  a { color: inherit; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(0.85); }
  }

  /* subtle CRT flicker */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.985; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #0d0d0d; }
  ::-webkit-scrollbar-thumb { background: #1f1f1d; border: 2px solid #0d0d0d; }
  ::-webkit-scrollbar-thumb:hover { background: #2a2a26; }
</style>
</head>
